name: Release to Play Store

on:
  push:
    tags:
      - 'v*'

jobs:
  release:
    name: Build & publish to internal track
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      - name: Decode keystore
        run: |
          echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 --decode > ${{ github.workspace }}/release.keystore

      - name: Derive version from tag
        id: version
        run: |
          TAG="${GITHUB_REF_NAME}"
          CLEAN="${TAG#v}"
          MAJOR=$(echo "$CLEAN" | cut -d. -f1)
          MINOR=$(echo "$CLEAN" | cut -d. -f2)
          PATCH=$(echo "$CLEAN" | cut -d. -f3)
          CODE=$(( MAJOR * 10000 + MINOR * 100 + PATCH ))
          echo "code=$CODE" >> "$GITHUB_OUTPUT"
          echo "name=$CLEAN" >> "$GITHUB_OUTPUT"

      - name: Build & sign release AAB
        run: ./gradlew bundleRelease
        env:
          STORE_FILE: ${{ github.workspace }}/release.keystore
          STORE_PASSWORD: ${{ secrets.STORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
          VERSION_CODE: ${{ steps.version.outputs.code }}
          VERSION_NAME: ${{ steps.version.outputs.name }}

      - name: Upload to Play Store (internal track)
        env:
          SERVICE_ACCOUNT_JSON: ${{ secrets.SERVICE_ACCOUNT_JSON }}
          VERSION_CODE: ${{ steps.version.outputs.code }}
          AAB_PATH: app/build/outputs/bundle/release/app-release.aab
          WHATSNEW_PATH: distribution/whatsnew
        run: |
          pip install --quiet google-auth requests
          python3 - <<'PYEOF'
          import json, os
          import google.oauth2.service_account
          import google.auth.transport.requests
          import requests

          creds = google.oauth2.service_account.Credentials.from_service_account_info(
              json.loads(os.environ['SERVICE_ACCOUNT_JSON']),
              scopes=['https://www.googleapis.com/auth/androidpublisher'],
          )
          creds.refresh(google.auth.transport.requests.Request())
          h = {'Authorization': f'Bearer {creds.token}'}

          pkg = 'dev.wordles.android'
          base = f'https://androidpublisher.googleapis.com/androidpublisher/v3/applications/{pkg}'

          edit_id = requests.post(f'{base}/edits', headers=h).json()['id']

          with open(os.environ['AAB_PATH'], 'rb') as f:
              r = requests.post(
                  f'https://androidpublisher.googleapis.com/upload/androidpublisher/v3/applications/{pkg}/edits/{edit_id}/bundles',
                  headers={**h, 'Content-Type': 'application/octet-stream'},
                  data=f,
              )
              r.raise_for_status()
              vc = r.json()['versionCode']
              print(f'Uploaded bundle versionCode={vc}')

          notes = []
          wn = f"{os.environ['WHATSNEW_PATH']}/whatsnew-en-US"
          if os.path.exists(wn):
              notes = [{'language': 'en-US', 'text': open(wn).read().strip()}]

          r = requests.put(
              f'{base}/edits/{edit_id}/tracks/internal',
              headers={**h, 'Content-Type': 'application/json'},
              json={'track': 'internal', 'releases': [{'versionCodes': [vc], 'status': 'completed', 'releaseNotes': notes}]},
          )
          r.raise_for_status()

          r = requests.post(f'{base}/edits/{edit_id}:commit', headers=h)
          r.raise_for_status()
          print(f'Released to internal track successfully')
          PYEOF
