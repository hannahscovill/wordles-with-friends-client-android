name: Release to Play Store

on:
  push:
    tags:
      - 'v*'

jobs:
  release:
    name: Build & publish to internal track
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      - name: Decode keystore
        run: |
          echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 --decode > ${{ github.workspace }}/release.keystore

      - name: Derive version from tag
        id: version
        run: |
          TAG="${GITHUB_REF_NAME}"           # e.g. v0.0.4
          CLEAN="${TAG#v}"                   # e.g. 0.0.4
          MAJOR=$(echo "$CLEAN" | cut -d. -f1)
          MINOR=$(echo "$CLEAN" | cut -d. -f2)
          PATCH=$(echo "$CLEAN" | cut -d. -f3)
          CODE=$(( MAJOR * 10000 + MINOR * 100 + PATCH ))
          echo "code=$CODE" >> "$GITHUB_OUTPUT"
          echo "name=$CLEAN" >> "$GITHUB_OUTPUT"

      - name: Build release AAB
        run: ./gradlew bundleRelease
        env:
          STORE_FILE: ${{ github.workspace }}/release.keystore
          STORE_PASSWORD: ${{ secrets.STORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
          VERSION_CODE: ${{ steps.version.outputs.code }}
          VERSION_NAME: ${{ steps.version.outputs.name }}

      - name: Sign AAB
        uses: r0adkll/sign-android-release@v1
        id: sign_aab
        with:
          releaseDirectory: app/build/outputs/bundle/release
          signingKeyBase64: ${{ secrets.KEYSTORE_BASE64 }}
          alias: ${{ secrets.KEY_ALIAS }}
          keyStorePassword: ${{ secrets.STORE_PASSWORD }}
          keyPassword: ${{ secrets.KEY_PASSWORD }}

      - name: Upload to Play Store (internal track)
        uses: r0adkll/upload-google-play@v1
        with:
          serviceAccountJsonPlainText: ${{ secrets.SERVICE_ACCOUNT_JSON }}
          packageName: dev.wordles.android
          releaseFiles: ${{ steps.sign_aab.outputs.signedReleaseFile }}
          tracks: internal
          status: completed
          whatsNewDirectory: distribution/whatsnew
